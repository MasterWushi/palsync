<html xmlns:c="contractpal">
    <head>
        <!-- 1. charset + viewport FIRST — required for Lighthouse 100 -->
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- 2. SEO head (seo-core skill). title <=60 chars, description 50-160,
             og:image/og:url ABSOLUTE. Use plain ASCII separators (| or -) in titles:
             the server decodes entities in meta attributes, so an em-dash WILL reach crawlers. -->
        <title>{{PAL_NAME}} | What It Does For Whom</title>
        <meta name="description" content="One plain sentence: what {{PAL_NAME}} does, for whom, and the outcome. 50 to 160 characters of honest description go here." />
        <link rel="canonical" href="https://YOUR-DOMAIN/" />

        <meta property="og:type" content="website" />
        <meta property="og:title" content="{{PAL_NAME}} | What It Does For Whom" />
        <meta property="og:description" content="One plain sentence: what {{PAL_NAME}} does, for whom, and the outcome." />
        <meta property="og:url" content="https://YOUR-DOMAIN/" />
        <meta property="og:image" content="https://YOUR-DOMAIN/Images/og-card.jpg" />
        <meta name="twitter:card" content="summary_large_image" />

        <!-- 3. robots + sitemap: handled in the workflow (see web.js).
             The workflow intercepts c.getHref() for /robots.txt and /sitemap.xml and
             returns c.createAjaxResponse(text, false) — no static files needed.
             Uncomment and update the <link> below once the sitemap URL is live: -->
        <!-- <link rel="sitemap" type="application/xml" href="https://YOUR-DOMAIN/sitemap.xml" /> -->

        <!-- 4. Structured data -->
        <script type="application/ld+json">
        {
          "@context": "https://schema.org",
          "@type": "Organization",
          "name": "{{PAL_NAME}}",
          "url": "https://YOUR-DOMAIN/"
        }
        </script>

        <!-- 5. Async Google Fonts — Lighthouse-approved pattern.
             preload as=style kicks the DNS/TCP early; onload swaps rel to stylesheet
             so the font never blocks rendering. The server strips <noscript> tags, so
             NO <noscript> fallback — the blocking <link> is re-introduced by the server
             automatically for crawlers that need it. -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="crossorigin" />
        <link rel="preload" as="style"
              href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&amp;family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&amp;display=swap"
              onload="this.onload=null;this.rel='stylesheet'" />

        <!-- 6. Speculationrules — prerender pages the user is likely to navigate to.
             Moderate eagerness: prefetches on hover, prerenders on mousedown. -->
        <script type="speculationrules">
        {"prerender":[{"where":{"href_matches":"/*"},"eagerness":"moderate"}]}
        </script>

        <link rel="STYLESHEET" type="text/css" href="../Styles/theme.css" />
    </head>
    <body>
        <div id="cp-root">
            <c:fragment name="navbar" />
            <c:fragment name="home-body" />
            <c:fragment name="footer" />
            <script type="text/javascript" src="../Scripts/reveal.js"></script>
        </div>
    </body>
</html>
