<html xmlns:c="contractpal">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- SEO head — the audited recipe (seo-core skill). Keep title <= 60 chars, description
             50-160, og:image/og:url ABSOLUTE, and use plain ASCII separators (| or -) in titles:
             the server decodes entities in meta attributes, so an em-dash WILL reach crawlers. -->
        <title>{{PAL_NAME}} | What It Does For Whom</title>
        <meta name="description" content="One plain sentence: what {{PAL_NAME}} does, for whom, and the outcome. 50 to 160 characters of honest description go here." />
        <link rel="canonical" href="https://YOUR-DOMAIN/" />

        <meta property="og:type" content="website" />
        <meta property="og:title" content="{{PAL_NAME}} | What It Does For Whom" />
        <meta property="og:description" content="One plain sentence: what {{PAL_NAME}} does, for whom, and the outcome." />
        <meta property="og:url" content="https://YOUR-DOMAIN/" />
        <meta property="og:image" content="https://webpals.cloudpiston.com/nx-ref/Images/og-card.jpg" />
        <meta name="twitter:card" content="summary_large_image" />

        <script type="application/ld+json">
        {
          "@context": "https://schema.org",
          "@type": "Organization",
          "name": "{{PAL_NAME}}",
          "url": "https://YOUR-DOMAIN/"
        }
        </script>

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="crossorigin" />
        <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&amp;family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&amp;display=swap" rel="stylesheet" />
        <link rel="STYLESHEET" type="text/css" href="../Styles/theme.css" />
    </head>
    <body>
        <div id="cp-root">
            <c:fragment name="navbar" />
            <c:fragment name="home-body" />
            <c:fragment name="footer" />
            <script type="text/javascript" src="../Scripts/reveal.js"></script>
        </div>
    </body>
</html>
